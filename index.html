<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyUser</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Snowfall Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Main Content */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            opacity: 0.9;
            animation: fadeIn 2s ease-in-out;
        }

        /* Bottom Center Discord Link */
        .discord-invite {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s, transform 0.3s;
        }

        .discord-invite:hover {
            color: #5865F2; /* Discord Blurple */
            transform: translateX(-50%) scale(1.1);
        }

        /* Bottom Left Expandable Menu */
        .expandable-menu {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 3;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-start;
            gap: 15px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            padding: 5px;
        }

        .menu-toggle:hover {
            color: #ffffff;
        }

        .menu-toggle.active {
            transform: rotate(180deg);
            color: #ffffff;
        }

        .menu-items {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 0 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0);
        }

        .menu-items.show {
            max-height: 200px;
            opacity: 1;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.2s;
            text-align: left;
            width: 100%;
        }

        .menu-item:hover {
            color: #ffffff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.9; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>

    <div class="main-container">
        <h1><b> 𝐏𝐫𝐨𝐱𝐲 𝐔𝐬𝐞𝐫 </b></h1>
    </div>

    <a href="#" target="_blank" class="discord-invite" aria-label="Discord Invite">
        <i data-lucide="disc"></i>
    </a>

    <div class="expandable-menu">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Info Menu">
            <i data-lucide="chevron-up"></i>
        </button>
        <div class="menu-items" id="menuItems">
            <div class="menu-item">
                <span>Discord: @d3adawak3</span>
            </div>
            <a href="#" target="https://github.com/prxyusr" class="menu-item">
                <span>GitHub:   @prxyusr</span>
            </a>
            <div class="menu-item" style="opacity: 0.4;">
                <span>N/A</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Menu Toggle Logic
        const menuToggle = document.getElementById('menuToggle');
        const menuItems = document.getElementById('menuItems');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuItems.classList.toggle('show');
        });

        // Snowfall Animation Logic
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const numFlakes = 75;
        const flakes = [];

        for (let i = 0; i < numFlakes; i++) {
            flakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 1, // Flake radius
                d: Math.random() * numFlakes, // Density/speed factor
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.5 - 0.25
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            moveSnow();
        }

        function moveSnow() {
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                
                f.y += f.speedY;
                f.x += f.speedX;

                // Reset flake if it goes off screen
                if (f.y > height) {
                    flakes[i] = {
                        x: Math.random() * width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speedY: f.speedY,
                        speedX: f.speedX
                    };
                }
                if (f.x > width) f.x = 0;
                else if (f.x < 0) f.x = width;
            }
        }

        function update() {
            drawSnow();
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
