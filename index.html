<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyUser</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Top Header Area for View Counter */
        .top-bar {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .top-bar i {
            width: 14px;
            height: 14px;
            stroke-width: 2.2px;
        }

        /* Click to Enter Overlay - Semi-transparent to reveal snow behind it */
        #click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(11, 12, 16, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; /* Positioned above hidden main content but below the snow canvas */
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #click-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .click-text {
            font-size: 2rem;
            color: #ffffff;
            font-family: inherit;
            animation: pulse 1.8s infinite ease-in-out;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* Snowfall Canvas - High z-index to overlay both screens */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Hidden Main Elements (Hidden initially, fades in later) */
        .main-container, .discord-invite, .expandable-menu, .top-bar {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        /* Active Fade In Class */
        .main-container.fade-in, .discord-invite.fade-in, .expandable-menu.fade-in, .top-bar.fade-in {
            opacity: 1;
            pointer-events: auto;
        }

        /* Main Content Positioning */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            opacity: 0.9;
            animation: fadeIn 2s ease-in-out;
        }

        /* Bottom Center Discord Link */
        .discord-invite {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s, transform 0.3s, opacity 0.8s ease; /* preserve opacity transition */
        }

        .discord-invite:hover {
            color: #5865F2; /* Discord Blurple */
            transform: translateX(-50%) scale(1.1);
        }

        /* Bottom Left Expandable Menu */
        .expandable-menu {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 13;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-start;
            gap: 15px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            padding: 5px;
        }

        .menu-toggle:hover {
            color: #ffffff;
        }

        .menu-toggle.active {
            transform: rotate(180deg);
            color: #ffffff;
        }

        .menu-items {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 0 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0);
        }

        .menu-items.show {
            max-height: 200px;
            opacity: 1;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.2s;
            text-align: left;
            width: 100%;
        }

        .menu-item:hover {
            color: #ffffff;
        }

        /* Hidden YouTube Container */
        #youtube-audio-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.9; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="top-bar" id="topBar">
        <i data-lucide="eye"></i>
        <span>views: <span id="busuanzi_value_site_pv">...</span></span>
    </div>

    <div id="click-overlay">
        <div class="click-text">𝐂𝐥𝐢𝐜𝐤 𝐌𝐞</div>
    </div>

    <canvas id="snowCanvas"></canvas>

    <div class="main-container" id="mainContainer">
        <h1><b> 𝐏𝐫𝐨𝐱𝐲 𝐔𝐬𝐞𝐫 </b></h1>
    </div>

    <a href="https://discord.gg/dgyR38mBsQ" target="_blank" class="discord-invite" id="discordInvite" aria-label="Discord Invite">
        <i data-lucide="disc"></i>
    </a>

    <div class="expandable-menu" id="expandableMenu">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Info Menu">
            <i data-lucide="chevron-up"></i>
        </button>
        <div class="menu-items" id="menuItems">
            <div class="menu-item">
                <span>Discord: @d3adawak3</span>
            </div>
            <a href="https://github.com/prxyusr" target="_blank" class="menu-item">
                <span>GitHub:   @prxyusr</span>
            </a>
            <div class="menu-item" style="opacity: 0.4;">
                <span>N/A</span>
            </div>
        </div>
    </div>

    <div id="youtube-audio-player"></div>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Menu Toggle Logic
        const menuToggle = document.getElementById('menuToggle');
        const menuItems = document.getElementById('menuItems');

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation(); 
            menuToggle.classList.toggle('active');
            menuItems.classList.toggle('show');
        });

        // YouTube Audio Integration
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '1',
                width: '1',
                videoId: 'JiC8lgLOdck', 
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'JiC8lgLOdck' 
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            if (player && typeof player.setVolume === 'function') {
                player.setVolume(7);
            }

            // Handle the overlay click
            const overlay = document.getElementById('click-overlay');
            const mainContainer = document.getElementById('mainContainer');
            const discordInvite = document.getElementById('discordInvite');
            const expandableMenu = document.getElementById('expandableMenu');
            const topBar = document.getElementById('topBar');

            overlay.addEventListener('click', () => {
                // Fade out overlay
                overlay.classList.add('fade-out');
                
                // Fade in all hidden elements simultaneously
                mainContainer.classList.add('fade-in');
                discordInvite.classList.add('fade-in');
                expandableMenu.classList.add('fade-in');
                topBar.classList.add('fade-in');
                
                if (player && typeof player.playVideo === 'function') {
                    player.playVideo();
                }
            }, { once: true });
        }

        // Snowfall Animation Logic
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const numFlakes = 75;
        const flakes = [];

        for (let i = 0; i < numFlakes; i++) {
            flakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 1,
                d: Math.random() * numFlakes,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.5 - 0.25
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            moveSnow();
        }

        function moveSnow() {
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                
                f.y += f.speedY;
                f.x += f.speedX;

                if (f.y > height) {
                    flakes[i] = {
                        x: Math.random() * width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speedY: f.speedY,
                        speedX: f.speedX
                    };
                }
                if (f.x > width) f.x = 0;
                else if (f.x < 0) f.x = width;
            }
        }

        function update() {
            drawSnow();
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
