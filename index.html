<script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Menu Toggle Logic
        const menuToggle = document.getElementById('menuToggle');
        const menuItems = document.getElementById('menuItems');

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents toggle click from interfering with page interactions
            menuToggle.classList.toggle('active');
            menuItems.classList.toggle('show');
        });

        // YouTube Audio Integration
        // Load the IFrame Player API code asynchronously
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '1',
                width: '1',
                videoId: 'JiC8lgLOdck', // Your YouTube video ID
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'JiC8lgLOdck' // Required for looping single videos
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Set the volume to 50% (values range from 0 to 100)
            if (player && typeof player.setVolume === 'function') {
                player.setVolume(50);
            }

            // Because modern browsers block autoplay with sound, we start audio on first user click
            document.body.addEventListener('click', () => {
                if (player && typeof player.playVideo === 'function') {
                    player.playVideo();
                }
            }, { once: true }); // '{ once: true }' ensures this event listener only runs once
        }

        // Snowfall Animation Logic
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const numFlakes = 75;
        const flakes = [];

        for (let i = 0; i < numFlakes; i++) {
            flakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 1,
                d: Math.random() * numFlakes,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.5 - 0.25
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            moveSnow();
        }

        function moveSnow() {
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                
                f.y += f.speedY;
                f.x += f.speedX;

                if (f.y > height) {
                    flakes[i] = {
                        x: Math.random() * width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speedY: f.speedY,
                        speedX: f.speedX
                    };
                }
                if (f.x > width) f.x = 0;
                else if (f.x < 0) f.x = width;
            }
        }

        function update() {
            drawSnow();
            requestAnimationFrame(update);
        }

        update();
    </script>
